{% set version = "0.2.1" %}

{% set posix = 'm2-' if win else '' %}

package:
  name: r-semver
  version: {{ version|replace("-", "_") }}

source:
  url:
    - {{ cran_mirror }}/src/contrib/semver_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/semver/semver_{{ version }}.tar.gz
  sha256: 8abd0e322e3d7e4e8e16f11dbb8aae96d07524466b6c0fd200acb3e9dec2fe2d

build:
  number: 0
  rpaths:
    - lib/R/lib/
    - lib/

requirements:
  build:
    - {{ compiler('c') }}              # [not win]
    - {{ stdlib("c") }}                # [not win]
    - {{ compiler('m2w64_c') }}        # [win]
    - {{ stdlib("m2w64_c") }}          # [win]
    - {{ compiler('cxx') }}            # [not win]
    - {{ compiler('m2w64_cxx') }}      # [win]
    - {{ posix }}filesystem        # [win]
    - {{ posix }}make
    - {{ posix }}sed               # [win]
    - {{ posix }}coreutils         # [win]
    - {{ posix }}zip               # [win]
  host:
    - r-base
    - r-rcpp >=0.12.8
    - r-assertthat
  run:
    - r-base
    - r-rcpp >=0.12.8
    - r-assertthat

test:
  commands:
    - $R -e "library('semver')"           # [not win]
    - "\"%R%\" -e \"library('semver')\""  # [win]

about:
  home: https://github.com/johndharrison/semver

  license: MIT
  summary: Tools and functions for parsing, rendering and operating on semantic version strings. Semantic versioning is a simple set of rules and requirements that dictate how version numbers are assigned and incremented as outlined at <http://semver.org>.

  license_family: MIT
  license_file:
    - '{{ environ["PREFIX"] }}/lib/R/share/licenses/MIT'
    - LICENSE

extra:
  recipe-maintainers:
    - ocefpaf
    - conda-forge/r
